<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1426"/>
      <stop offset="100%" stop-color="#07070F"/>
    </radialGradient>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-center" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="112"/>

  <!-- Outer ring glow (behind) -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="#00D4FF" stroke-width="28" opacity="0.18"/>

  <!-- Outer ring main -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="#00D4FF" stroke-width="12" opacity="0.9" filter="url(#glow-cyan)"/>

  <!-- Outer ring bright core -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="white" stroke-width="3" opacity="0.7"/>

  <!-- Inner ring glow (behind) -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="#9B4FE8" stroke-width="20" opacity="0.2"/>

  <!-- Inner ring main -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="#8B35D6" stroke-width="9" opacity="0.9" filter="url(#glow-purple)"/>

  <!-- Inner ring bright core -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="white" stroke-width="2.5" opacity="0.55"/>

  <!-- Center glow -->
  <circle cx="256" cy="256" r="22" fill="#00D4FF" opacity="0.9" filter="url(#glow-center)"/>
  <circle cx="256" cy="256" r="10" fill="white" opacity="0.95"/>
</svg>
